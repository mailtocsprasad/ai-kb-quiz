# ai-kb-quiz configuration
# Copy this file to config.yaml and edit as needed.
# config.yaml is gitignored — never commit API keys.

# Model mode: "local", "premium", or "hybrid"
mode: hybrid

# Local model — must be available via Ollama (ollama pull <name>)
#
# Install Ollama first: winget install Ollama.Ollama
#
# GPU model guide (discrete GPU with 8–16 GB VRAM):
#
#   Model              VRAM     Best for
#   ────────────────────────────────────────────────────────────
#   phi4:14b     (Q4)  ~8.5 GB  Structured output, JSON, scoring ← recommended
#   qwen2.5:14b  (Q4)  ~8.7 GB  Technical reasoning
#   llama3.1:8b  (Q4)  ~4.7 GB  Fastest local tier, general fallback
#
# CPU-only model guide (no discrete GPU):
#
#   Model                RAM      Best for
#   ─────────────────────────────────────────────────────────────
#   phi4-mini (3.8B Q4)  ~3.5 GB  Reasoning, code ← recommended
#   llama3.2:3b  (Q4)    ~3.0 GB  General fallback
#   gemma3:4b    (Q4)    ~4.0 GB  Document understanding
#   qwen2.5-coder:7b(Q4) ~5.5 GB  Code-heavy KB topics
#   mistral:7b   (Q4)    ~5.5 GB  General (fine-tuning friendly)
#
local_model: phi4:14b

# Premium provider: "anthropic" (default) or "gemini"
premium_provider: anthropic

# Anthropic Claude — used when premium_provider: anthropic
premium_model: claude-sonnet-4-6
# API key resolution — tried in order, first match wins:
#   1. ANTHROPIC_API_KEY environment variable
#   2. api_key_file path below (gitignored, never committed)
api_key_file: Claude-Key.txt

# Google Gemini — used when premium_provider: gemini
gemini_model: gemini-2.5-flash
# API key resolution — tried in order, first match wins:
#   1. GEMINI_API_KEY environment variable
#   2. gemini_api_key_file path below (gitignored, never committed)
gemini_api_key_file: Gemini-Key.txt

# Embedding backend and model for KB vector index
#
# embedding_backend:
#   "auto"                  — detect best available: gemini → ollama → sentence-transformers
#                             choice is locked in kb_index/backend_lock.json on first index build
#                             run kb index --rebuild to re-detect after changing credentials
#   "gemini"                — Gemini embedding API (recommended — uses task types for asymmetric RAG)
#   "ollama"                — served via Ollama /api/embeddings (local, no API key needed)
#   "sentence-transformers" — runs via sentence-transformers Python library (CPU fallback)
#
# Gemini embedding models:
#   gemini-embedding-001   768-dim, GA standard, top MTEB multilingual ← recommended
#   gemini-embedding-2     3072-dim, multimodal (text + images + audio)
#
# embedding_dimensions: MRL truncation for gemini backend (768 = optimal sweet spot)
#   768 dim → 75% storage reduction vs 3072-dim, rivals dedicated 768-dim legacy models
#   Must match between indexing and querying — full rebuild required if changed.
#
# Ollama embedding models (pull with: ollama pull <model>):
#   nomic-embed-text   768-dim, strong semantic quality
#   all-minilm         384-dim, fast and lightweight
#
# sentence-transformers models (auto-downloaded from HuggingFace on first run):
#   all-MiniLM-L6-v2   384-dim, CPU-friendly fallback
#
embedding_backend: gemini
gemini_embedding_model: gemini-embedding-001
embedding_dimensions: 768
embedding_model: nomic-embed-text

# Quiz settings
quiz:
  default_questions: 5     # used when --questions not provided
  max_questions: 20        # hard cap regardless of CLI input
  show_correct_answer: true
  show_kb_excerpt: true

# Retriever settings
retriever:
  top_k: 5                 # KB chunks returned per query
  min_score: 0.25          # cosine similarity threshold (0.0–1.0)

# PTC (Process-Then-Communicate) settings
ptc:
  max_output_tokens: 1000  # target max tokens in compressed output

# Programmable Tool Calling settings
prog_tool_calling:
  sandbox_timeout_sec: 10  # max runtime for model-generated extraction scripts

# Observability
logging:
  enabled: true
  log_dir: logs/
  log_compression_ratio: true
